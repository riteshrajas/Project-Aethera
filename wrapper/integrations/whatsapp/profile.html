<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .profile-container {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
            padding: 20px;
        }
        .profile-picture {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #d9d9d9;
            margin: 0 auto;
        }
        .contact-name {
            font-size: 1.5em;
            margin: 10px 0;
            color: #333333;
        }
        .status {
            font-size: 1em;
            color: #666666;
            margin-bottom: 10px;
        }
        .last-seen {
            font-size: 0.9em;
            color: #999999;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-picture"></div>
        <div class="contact-name">Contact Name</div>
        <div class="status">Hey there! I am using WhatsApp.</div>
        <div class="last-seen">Last seen today at 3:45 PM</div>
    </div>
</body>
</html>
